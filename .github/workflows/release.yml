name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
          - arch: aarch64
            runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu

    steps:
      - name: Checkout lua-flame-rs
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            clang \
            libbpf-dev \
            libelf-dev \
            linux-tools-common \
            llvm \
            pkg-config \
            zlib1g-dev
          sudo apt-get install -y --no-install-recommends "linux-tools-$(uname -r)" || \
            sudo apt-get install -y --no-install-recommends linux-tools-generic

      - name: Regenerate architecture BTF header
        run: |
          set -euo pipefail
          bpftool_bin="$(command -v bpftool)"
          if ! "$bpftool_bin" version >/dev/null 2>&1; then
            bpftool_bin="$(find /usr/lib/linux-tools -type f -name bpftool | sort -V | tail -n 1)"
          fi
          test -x "$bpftool_bin"
          "$bpftool_bin" btf dump file /sys/kernel/btf/vmlinux format c > bpf/vmlinux.h

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.rust_target }}

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.rust_target }}

      - name: Package release artifact
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME//\//-}"
          package="lua-flame-${version}-${{ matrix.rust_target }}"
          mkdir -p "dist/${package}"
          cp "target/${{ matrix.rust_target }}/release/lua-flame" "dist/${package}/"
          cp README.md "dist/${package}/"
          tar -C dist -czf "dist/${package}.tar.gz" "${package}"
          sha256sum "dist/${package}.tar.gz" > "dist/${package}.tar.gz.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: lua-flame-${{ matrix.rust_target }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* --title "$TAG" --generate-notes
          fi
