name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  LUAJIT_SRC_DIR: ${{ github.workspace }}/deps/luajit2/src
  # The harness test must never silently skip in CI.
  LUAJIT2_FLAME_RS_HARNESS_REQUIRED: "1"

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout luajit2-flame-rs
        uses: actions/checkout@v4

      - name: Checkout LuaJIT2
        uses: actions/checkout@v4
        with:
          repository: openresty/luajit2
          path: deps/luajit2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf \
            automake \
            autopoint \
            bison \
            build-essential \
            clang \
            flex \
            gawk \
            libbpf-dev \
            libelf-dev \
            linux-tools-common \
            llvm \
            pkg-config \
            zlib1g-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Build LuaJIT2
        working-directory: deps/luajit2/src
        run: make -j"$(nproc)"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --locked --all-targets

      - name: Build release
        run: cargo build --locked --release

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: luajit2-flame-rs-${{ runner.os }}-${{ runner.arch }}
          path: target/release/luajit2-flame-rs
          if-no-files-found: error

  e2e:
    name: E2E smoke (sudo)
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - name: Checkout luajit2-flame-rs
        uses: actions/checkout@v4

      - name: Checkout LuaJIT2
        uses: actions/checkout@v4
        with:
          repository: openresty/luajit2
          path: deps/luajit2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential

      - name: Build LuaJIT2
        working-directory: deps/luajit2/src
        run: make -j"$(nproc)"

      - name: Build test harness
        run: |
          mkdir -p /tmp/luajit-lib
          cp deps/luajit2/src/libluajit.so /tmp/luajit-lib/libluajit.so
          cp deps/luajit2/src/libluajit.so /tmp/luajit-lib/libluajit-5.1.so.2
          cc -O2 tests/harness.c -o /tmp/lua-harness \
            -I"$GITHUB_WORKSPACE/deps/luajit2/src" \
            -L/tmp/luajit-lib -lluajit -lm -ldl \
            -Wl,-rpath=/tmp/luajit-lib
          ldd /tmp/lua-harness
          LUAJIT2_FLAME_RS_HARNESS_ITERS=1 \
            LUAJIT2_FLAME_RS_WORK_ITERS=10 \
            /tmp/lua-harness "$GITHUB_WORKSPACE/tests/cpu-burn.lua"

      - name: Download profiler binary
        uses: actions/download-artifact@v4
        with:
          name: luajit2-flame-rs-${{ runner.os }}-${{ runner.arch }}
          path: dist-bin

      - name: Preflight kernel checks
        run: |
          uname -a
          cat /proc/sys/kernel/perf_event_paranoid
          sudo test -r /sys/kernel/btf/vmlinux
          chmod +x dist-bin/luajit2-flame-rs

      - name: Start interpreter workload
        run: |
          /tmp/lua-harness "$GITHUB_WORKSPACE/tests/cpu-burn.lua" > /tmp/harness.log 2>&1 &
          echo "HPID=$!" >> "$GITHUB_ENV"

      - name: Profile Lua frames
        run: |
          sleep 1
          if ! kill -0 "$HPID" 2>/dev/null; then
            echo "::error::LuaJIT workload exited before profiling"
            cat /tmp/harness.log
            exit 1
          fi
          sudo ./dist-bin/luajit2-flame-rs -p "$HPID" -d 5 -o folded.txt 2>&1 | tee /tmp/lua-only.log

      - name: Verify Lua-only output
        run: |
          ls -l folded.txt folded.svg || true
          echo '--- folded.txt ---'
          cat folded.txt 2>/dev/null || true
          if ! test -s folded.txt; then
            echo "::error::folded.txt is missing or empty"
            exit 1
          fi
          if ! test -s folded.svg; then
            echo "::error::folded.svg is missing or empty"
            exit 1
          fi
          if ! grep -q 'L:.*cpu-burn' folded.txt; then
            echo "::error::folded.txt contains no cpu-burn Lua frame"
            exit 1
          fi

      - name: Profile mixed C + Lua frames
        run: sudo ./dist-bin/luajit2-flame-rs -p "$HPID" --include-c-stacks -d 5 -o mixed.txt 2>&1 | tee /tmp/mixed.log

      - name: Verify mixed output
        run: |
          test -s mixed.txt
          test -s mixed.svg
          grep -q 'L:.*cpu-burn' mixed.txt
          grep -q 'user-space DWARF unwind' /tmp/mixed.log

      - name: Profile native-only frames
        run: sudo ./dist-bin/luajit2-flame-rs -p "$HPID" --disable-lua -d 5 -o native.txt 2>&1 | tee /tmp/native.log

      - name: Verify native-only output
        run: |
          test -s native.txt
          test -s native.svg
          ! grep -q 'L:' native.txt

      - name: Restart workload with JIT enabled
        run: |
          kill "$HPID" 2>/dev/null || true
          LUAJIT2_FLAME_RS_JIT=1 /tmp/lua-harness "$GITHUB_WORKSPACE/tests/cpu-burn.lua" > /tmp/harness-jit.log 2>&1 &
          echo "HPID=$!" >> "$GITHUB_ENV"
          sleep 3

      - name: Profile JIT traces
        run: sudo ./dist-bin/luajit2-flame-rs -p "$HPID" -d 8 -o jit.txt 2>&1 | tee /tmp/jit.log

      - name: Verify JIT output
        run: |
          test -s jit.txt
          test -s jit.svg
          grep -q 'JIT:' jit.txt

      - name: Upload E2E diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-diagnostics-${{ github.run_attempt }}
          path: |
            folded.txt
            folded.svg
            mixed.txt
            mixed.svg
            native.txt
            native.svg
            jit.txt
            jit.svg
            /tmp/lua-only.log
            /tmp/mixed.log
            /tmp/native.log
            /tmp/jit.log
            /tmp/harness.log
            /tmp/harness-jit.log
          if-no-files-found: warn

      - name: Stop workload
        if: always()
        run: |
          kill "$HPID" 2>/dev/null || true
          echo '--- harness.log ---'
          cat /tmp/harness.log 2>/dev/null || true
          echo '--- harness-jit.log ---'
          cat /tmp/harness-jit.log 2>/dev/null || true
