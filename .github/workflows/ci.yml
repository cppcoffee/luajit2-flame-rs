name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  LUAJIT_SRC_DIR: ${{ github.workspace }}/deps/luajit2/src
  # The harness test must never silently skip in CI.
  LUAJIT2_FLAME_RS_HARNESS_REQUIRED: "1"

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout luajit2-flame-rs
        uses: actions/checkout@v4

      - name: Checkout LuaJIT2
        uses: actions/checkout@v4
        with:
          repository: openresty/luajit2
          path: deps/luajit2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf \
            automake \
            autopoint \
            bison \
            build-essential \
            clang \
            flex \
            gawk \
            libbpf-dev \
            libelf-dev \
            linux-tools-common \
            llvm \
            pkg-config \
            zlib1g-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Build LuaJIT2
        working-directory: deps/luajit2/src
        run: make -j"$(nproc)"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --locked --all-targets

      - name: Build release
        run: cargo build --locked --release

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: luajit2-flame-rs-${{ runner.os }}-${{ runner.arch }}
          path: target/release/luajit2-flame-rs
          if-no-files-found: error
